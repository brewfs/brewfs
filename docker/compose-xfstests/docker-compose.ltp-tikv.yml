services:
  pd:
    image: pingcap/pd:v8.5.0
    command:
      - --name=pd
      - --data-dir=/data/pd
      - --client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://pd:2379
      - --peer-urls=http://0.0.0.0:2380
      - --advertise-peer-urls=http://pd:2380
      - --initial-cluster=pd=http://pd:2380
      - --log-level=warn
    volumes:
      - pd-data-ltp-tikv:/data/pd
    networks:
      - brewfs-ltp

  tikv:
    image: pingcap/tikv:v8.5.0
    depends_on:
      pd:
        condition: service_started
    command:
      - --addr=0.0.0.0:20160
      - --advertise-addr=tikv:20160
      - --status-addr=0.0.0.0:20180
      - --pd=pd:2379
      - --data-dir=/data/tikv
      - --log-level=warn
    volumes:
      - tikv-data-ltp-tikv:/data/tikv
    networks:
      - brewfs-ltp
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576

  tikv-ready:
    image: curlimages/curl:8.10.1
    depends_on:
      pd:
        condition: service_started
      tikv:
        condition: service_started
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - |
        timeout 180 sh -ec '
          while true; do
            body="$$(curl -fsS http://pd:2379/pd/api/v1/stores 2>/dev/null || true)"
            echo "$$body" | grep -Eq "\"state_name\"[[:space:]]*:[[:space:]]*\"Up\"" && exit 0
            sleep 2
          done
        '
    networks:
      - brewfs-ltp

  rustfs:
    image: rustfs/rustfs:latest
    expose:
      - "9000"
      - "9001"
    environment:
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-rustfsadmin}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:-rustfsadmin}
      RUSTFS_CONSOLE_ENABLE: ${RUSTFS_CONSOLE_ENABLE:-true}
      RUSTFS_SERVER_DOMAINS: ${RUSTFS_SERVER_DOMAINS:-rustfs}
    command:
      - --address
      - :9000
      - --console-enable
      - --server-domains
      - ${RUSTFS_SERVER_DOMAINS:-rustfs}
      - --access-key
      - ${RUSTFS_ACCESS_KEY:-rustfsadmin}
      - --secret-key
      - ${RUSTFS_SECRET_KEY:-rustfsadmin}
      - /data
    volumes:
      - ${RUSTFS_DATA_HOST_DIR:-rustfs-data-ltp-tikv}:/data
    networks:
      - brewfs-ltp
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

  rustfs-init:
    image: amazon/aws-cli:latest
    depends_on:
      rustfs:
        condition: service_started
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - |
        mkdir -p /root/.aws
        printf '[default]\ns3 =\n  addressing_style = path\n' > /root/.aws/config
        timeout 180 sh -ec '
          while true; do
            aws --endpoint-url http://rustfs:9000 s3api create-bucket --bucket ${BREWFS_S3_BUCKET:-brewfs-data} >/dev/null 2>&1 && exit 0
            aws --endpoint-url http://rustfs:9000 s3api head-bucket --bucket ${BREWFS_S3_BUCKET:-brewfs-data} >/dev/null 2>&1 && exit 0
            sleep 2
          done
        '
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-rustfsadmin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-rustfsadmin}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      AWS_EC2_METADATA_DISABLED: ${AWS_EC2_METADATA_DISABLED:-true}
    networks:
      - brewfs-ltp

  ltp:
    image: brewfs-ltp:local
    build:
      context: ../..
      dockerfile: docker/compose-xfstests/Dockerfile.ltp
    depends_on:
      tikv-ready:
        condition: service_completed_successfully
      rustfs-init:
        condition: service_completed_successfully
    environment:
      BREWFS_META_BACKEND: tikv
      BREWFS_META_TIKV_PD_ENDPOINTS: pd:2379
      BREWFS_META_TIKV_NAMESPACE: ${BREWFS_META_TIKV_NAMESPACE:-brewfs}
      BREWFS_DATA_BACKEND: s3
      BREWFS_DATA_DIR: /var/lib/brewfs/data
      BREWFS_S3_BUCKET: ${BREWFS_S3_BUCKET:-brewfs-data}
      BREWFS_S3_ENDPOINT: ${BREWFS_S3_ENDPOINT:-http://rustfs:9000}
      BREWFS_S3_REGION: ${BREWFS_S3_REGION:-us-east-1}
      BREWFS_S3_FORCE_PATH_STYLE: ${BREWFS_S3_FORCE_PATH_STYLE:-true}
      BREWFS_CONFIG_PATH: /run/brewfs/config.yaml
      BREWFS_CACHE_ROOT: ${BREWFS_CACHE_ROOT:-}
      BREWFS_READ_MEMORY_BYTES: ${BREWFS_READ_MEMORY_BYTES:-}
      BREWFS_READ_SSD_BYTES: ${BREWFS_READ_SSD_BYTES:-}
      BREWFS_WRITE_MEMORY_BYTES: ${BREWFS_WRITE_MEMORY_BYTES:-}
      BREWFS_WRITE_SSD_BYTES: ${BREWFS_WRITE_SSD_BYTES:-}
      BREWFS_DIRTY_SLICE_TARGET_SIZE: ${BREWFS_DIRTY_SLICE_TARGET_SIZE:-}
      BREWFS_DIRTY_SLICE_MAX_AGE_MS: ${BREWFS_DIRTY_SLICE_MAX_AGE_MS:-}
      BREWFS_UPLOAD_CONCURRENCY: ${BREWFS_UPLOAD_CONCURRENCY:-}
      BREWFS_POPULATE_WRITE_CACHE_AFTER_UPLOAD: ${BREWFS_POPULATE_WRITE_CACHE_AFTER_UPLOAD:-}
      BREWFS_PERSIST_WRITE_CACHE_AFTER_UPLOAD: ${BREWFS_PERSIST_WRITE_CACHE_AFTER_UPLOAD:-}
      BREWFS_WRITEBACK_MODE: ${BREWFS_WRITEBACK_MODE:-}
      BREWFS_WRITEBACK_PERSIST_SYNC: ${BREWFS_WRITEBACK_PERSIST_SYNC:-}
      BREWFS_WRITEBACK_REQUIRE_STAGE_BEFORE_COMMIT: ${BREWFS_WRITEBACK_REQUIRE_STAGE_BEFORE_COMMIT:-}
      BREWFS_WRITEBACK_RECENT_PENDING_SOFT_BYTES: ${BREWFS_WRITEBACK_RECENT_PENDING_SOFT_BYTES:-}
      BREWFS_WRITEBACK_RECENT_PENDING_HARD_BYTES: ${BREWFS_WRITEBACK_RECENT_PENDING_HARD_BYTES:-}
      BREWFS_MEMORY_BUDGET_BYTES: ${BREWFS_MEMORY_BUDGET_BYTES:-}
      BREWFS_VERIFY_CACHE_CHECKSUM: ${BREWFS_VERIFY_CACHE_CHECKSUM:-}
      BREWFS_LOG_FILE: /artifacts/brewfs.log
      BREWFS_FUSE_OP_LOG: ${BREWFS_FUSE_OP_LOG:-0}
      BREWFS_FUSE_DIRECT_IO: ${BREWFS_FUSE_DIRECT_IO:-}
      BREWFS_FUSE_READ_DIRECT_IO: ${BREWFS_FUSE_READ_DIRECT_IO:-}
      BREWFS_FUSE_WRITE_DIRECT_IO: ${BREWFS_FUSE_WRITE_DIRECT_IO:-}
      BREWFS_FUSE_KEEP_CACHE: ${BREWFS_FUSE_KEEP_CACHE:-}
      BREWFS_FUSE_WRITEBACK: ${BREWFS_FUSE_WRITEBACK:-}
      BREWFS_MOUNT_WAIT_SECS: ${BREWFS_MOUNT_WAIT_SECS:-60}
      BREWFS_PRE_MOUNT_WAIT_SECS: ${BREWFS_PRE_MOUNT_WAIT_SECS:-10}
      BREWFS_MOUNT_READY_DELAY_SECS: ${BREWFS_MOUNT_READY_DELAY_SECS:-1}
      BREWFS_FUSE_LOG_FILE: /artifacts/brewfs_fuse_ops.log
      BREWFS_ARTIFACT_DIR: ${BREWFS_ARTIFACT_DIR:-}
      BREWFS_ARTIFACT_ROOT: /artifacts
      LTP_SCENARIOS: fs
      LTP_EXTRA_ARGS: ${LTP_EXTRA_ARGS:-}
      LTP_SKIP_FILES: ${LTP_SKIP_FILES:-}
      LTP_SKIP_TESTS: ${LTP_SKIP_TESTS:-}
      LTP_SKIP_TESTS_FILE: ${LTP_SKIP_TESTS_FILE:-}
      LTP_DEFAULT_SKIP_TESTS_FILE: ${LTP_DEFAULT_SKIP_TESTS_FILE:-/usr/local/share/brewfs/ltp_skip_tests.txt}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-rustfsadmin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-rustfsadmin}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      AWS_EC2_METADATA_DISABLED: ${AWS_EC2_METADATA_DISABLED:-true}
      RUST_LOG: ${RUST_LOG:-brewfs=info}
    privileged: true
    devices:
      - /dev/fuse:/dev/fuse
    cap_add:
      - SYS_ADMIN
    security_opt:
      - apparmor=unconfined
    volumes:
      - ./artifacts:/artifacts
      - brewfs-state-ltp-tikv:/var/lib/brewfs
    networks:
      - brewfs-ltp
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

networks:
  brewfs-ltp:
    driver: bridge

volumes:
  brewfs-state-ltp-tikv:
  pd-data-ltp-tikv:
  tikv-data-ltp-tikv:
  rustfs-data-ltp-tikv:
