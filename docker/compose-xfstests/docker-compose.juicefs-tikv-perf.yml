services:
  pd:
    image: pingcap/pd:v8.5.0
    container_name: pd-juicefs-perf-tikv
    command:
      - --name=pd
      - --data-dir=/data/pd
      - --client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://pd:2379
      - --peer-urls=http://0.0.0.0:2380
      - --advertise-peer-urls=http://pd:2380
      - --initial-cluster=pd=http://pd:2380
      - --log-level=warn
    ports:
      - "${JUICEFS_TIKV_PD_HOST_BIND:-127.0.0.1}:${JUICEFS_TIKV_PD_HOST_PORT:-22379}:2379"
    volumes:
      - pd-data-juicefs-perf-tikv:/data/pd
    networks:
      - juicefs-tikv-xfstests

  tikv:
    image: pingcap/tikv:v8.5.0
    container_name: tikv-juicefs-perf
    depends_on:
      pd:
        condition: service_started
    command:
      - --addr=0.0.0.0:20160
      - --advertise-addr=tikv:20160
      - --status-addr=0.0.0.0:20180
      - --pd=pd:2379
      - --data-dir=/data/tikv
      - --log-level=warn
    ports:
      - "${JUICEFS_TIKV_HOST_BIND:-127.0.0.1}:${JUICEFS_TIKV_STATUS_HOST_PORT:-30180}:20180"
    volumes:
      - tikv-data-juicefs-perf:/data/tikv
    networks:
      - juicefs-tikv-xfstests
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576

  tikv-ready:
    image: curlimages/curl:8.10.1
    depends_on:
      pd:
        condition: service_started
      tikv:
        condition: service_started
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - |
        timeout 180 sh -ec '
          ready_count=0
          while true; do
            body="$$(curl -fsS http://pd:2379/pd/api/v1/stores 2>/dev/null || true)"
            if echo "$$body" | grep -Eq "\\\"state_name\\\"[[:space:]]*:[[:space:]]*\\\"Up\\\""; then
              ready_count=$$((ready_count + 1))
              [ "$$ready_count" -ge 3 ] && exit 0
            else
              ready_count=0
            fi
            sleep 2
          done
        '
    networks:
      - juicefs-tikv-xfstests

  rustfs:
    image: rustfs/rustfs:latest
    container_name: rustfs-juicefs-perf-tikv
    expose:
      - "9000"
      - "9001"
    ports:
      - "${RUSTFS_HOST_BIND:-127.0.0.1}:${RUSTFS_S3_HOST_PORT:-19000}:9000"
      - "${RUSTFS_HOST_BIND:-127.0.0.1}:${RUSTFS_CONSOLE_HOST_PORT:-19001}:9001"
    environment:
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-rustfsadmin}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:-rustfsadmin}
      RUSTFS_CONSOLE_ENABLE: ${RUSTFS_CONSOLE_ENABLE:-true}
      RUSTFS_SERVER_DOMAINS: ${RUSTFS_SERVER_DOMAINS:-rustfs}
    command:
      - --address
      - :9000
      - --console-enable
      - --server-domains
      - ${RUSTFS_SERVER_DOMAINS:-rustfs}
      - --access-key
      - ${RUSTFS_ACCESS_KEY:-rustfsadmin}
      - --secret-key
      - ${RUSTFS_SECRET_KEY:-rustfsadmin}
      - /data
    volumes:
      - rustfs-data-juicefs-perf-tikv:/data
    networks:
      - juicefs-tikv-xfstests

  rustfs-init:
    image: amazon/aws-cli:latest
    depends_on:
      rustfs:
        condition: service_started
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - |
        mkdir -p /root/.aws
        printf '[default]\ns3 =\n  addressing_style = path\n' > /root/.aws/config
        timeout 180 sh -ec '
          while true; do
            aws --endpoint-url http://rustfs:9000 s3api create-bucket --bucket ${BREWFS_S3_BUCKET:-brewfs-data} >/dev/null 2>&1 && exit 0
            aws --endpoint-url http://rustfs:9000 s3api head-bucket --bucket ${BREWFS_S3_BUCKET:-brewfs-data} >/dev/null 2>&1 && exit 0
            sleep 2
          done
        '
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-rustfsadmin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-rustfsadmin}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      AWS_EC2_METADATA_DISABLED: ${AWS_EC2_METADATA_DISABLED:-true}
    networks:
      - juicefs-tikv-xfstests

  perf:
    image: juicefs-xfstests-perf:local
    build:
      context: ../..
      dockerfile: docker/compose-xfstests/Dockerfile.juicefs-perf
    depends_on:
      tikv-ready:
        condition: service_completed_successfully
    environment:
      JFS_META_URL: tikv://pd:2379/juicefs
      JFS_S3_BUCKET: ${BREWFS_S3_BUCKET:-brewfs-data}
      JFS_S3_ENDPOINT: ${BREWFS_S3_ENDPOINT:-http://rustfs:9000}
      JFS_S3_REGION: ${BREWFS_S3_REGION:-us-east-1}
      BREWFS_ARTIFACT_DIR: ${BREWFS_ARTIFACT_DIR:-}
      BREWFS_ARTIFACT_ROOT: /artifacts
      XFSTESTS_DIR: /opt/xfstests-dev
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-rustfsadmin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-rustfsadmin}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      AWS_EC2_METADATA_DISABLED: ${AWS_EC2_METADATA_DISABLED:-true}
      RUST_LOG: ${RUST_LOG:-error}
    privileged: true
    devices:
      - /dev/fuse:/dev/fuse
    cap_add:
      - SYS_ADMIN
    security_opt:
      - apparmor=unconfined
    volumes:
      - ./artifacts:/artifacts
      - ${JUICEFS_TIKV_PERF_STATE_MOUNT:-juicefs-state-perf-tikv}:/var/lib/juicefs
    networks:
      - juicefs-tikv-xfstests

networks:
  juicefs-tikv-xfstests:
    driver: bridge

volumes:
  pd-data-juicefs-perf-tikv:
  tikv-data-juicefs-perf:
  rustfs-data-juicefs-perf-tikv:
  juicefs-state-perf-tikv:
